version: '3.8'

services:
  yamul-gateway:
    build:
      context: .
      dockerfile: ./gateway.Dockerfile
    ports:
      - "2593:2593"
    environment:
      YAMUL_LOGIN_ADDR: "yamul-backend:8087"
      YAMUL_CHARACTER_ADDR: "yamul-backend:8088"
      YAMUL_GAME_ADDR: "yamul-backend:8089"

  yamul-backend:
    build:
      context: .
      dockerfile: ./backend.Dockerfile
    environment:
      SPRING_PROFILES_ACTIVE: dev
      MULTIMA_MULFILES_DIR: /mulfiles
    volumes:
      - ./mulfiles:/mulfiles
    healthcheck:
      # Uses bash TCP pseudo-device — works on the Corretto/Amazon Linux base without netcat
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8087'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  yamul-envoy:
    image: envoyproxy/envoy:v1.31-latest
    entrypoint: /usr/local/bin/envoy -c /etc/envoy/envoy.yaml --service-cluster proxy
    volumes:
      - ./api-definitions/dashboard/envoy.yaml:/etc/envoy/envoy.yaml
    depends_on:
      yamul-backend:
        condition: service_healthy

  yamul-dashboard:
    build:
      context: .
      dockerfile: ./dashboard.Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      - yamul-envoy