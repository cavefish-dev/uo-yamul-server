# This workflow will build a Kotlin/Gradle project

name: yamul-backend-ci

on:
  push:
    branches: [ "main" ]
    paths:
      - 'yamul-backend/**'
      - 'api-definitions/**'
      - '.github/workflows/yamul-backend-ci.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'yamul-backend/**'
      - 'api-definitions/**'
      - '.github/workflows/yamul-backend-ci.yml'

jobs:

  build:
    defaults:
      run:
        working-directory: ./yamul-backend
    runs-on: ubuntu-latest
    env:
      GRADLE_OPTS: "-Dorg.gradle.java.home=$JAVA_HOME"
    steps:
    - uses: actions/checkout@v4

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Build
      run: ./gradlew assemble -x googleJavaFormat -x verifyGoogleJavaFormat

    - name: Test
      run: ./gradlew test
